test_code_formatting:
  image: "python:3.9"
  #XXX# tags:
  #XXX#   - shared
  #XXX#   - docker
  #XXX#   - cloud
  stage: test
  before_script:
    - python -m pip install pre-commit
    - pre-commit install
  script:
    - pre-commit run --all-files

docs:
  stage: test
  before_script:
    - conda create -n test_env -c conda-forge 'python=3.10'
    # TODO remove duplication: the rest of the before script is
    # copied from before-script-after (to remove the GPU check)
    # For pyvista/vtk and GCC
    - apt update -y -qq && apt install -y -qq libgl1 build-essential pandoc
    - gcc --version
    # load the conda infrastructure
    - conda init bash
    # because `conda activate` doesnot work out of the box!!
    - source ~/.bashrc
    - conda activate test_env
    - python -v  # For debugging
    - pip install .[dev]
  script:
    - cd docs
    - make html
  artifacts:
    paths:
      - docs/_build
  inherit:
    default:
      - image


pages:
  # Take compiled html, and make available on gitlab pages
  # at neuralmag.gitlab.io/neuralmag
  stage: deploy
  variables:
    # The deploy job does not need the neuralmag sources.
    GIT_STRATEGY: none
  script:
    # gitlab pages will published everything in `public`
    - mkdir -p public
    - cp -a docs/_build/html/* public
  artifacts:
    paths:
      - public
  rules:
    # This ensures that only pushes to the default branch will trigger
    # a pages deploy.
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH

# defining workflow rules is required to avoid duplicated pipelines
# (https://docs.gitlab.com/ee/ci/jobs/job_rules.html#avoid-duplicate-pipelines)
# With the following rules, we only run the CI on the main branch,
# for open merge requests (but not for commits on different branches when no 
# MR has been opened yet), when pushing tags, or when manually running a pipeline
# in the web interface
workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"
