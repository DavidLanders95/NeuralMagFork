default:
  image: continuumio/miniconda3:4.10.3p1
  #XXX# tags:
  #XXX#   - cloud-gpu
  #XXX#   - nvidia-cc80

# Dot in front of the job will hide it from the CI
.setup_python_containers_and_test:
  before_script: &before-script-after
    # For pyvista/vtk and GCC
    - apt update -y -qq && apt install -y -qq libgl1 build-essential
    - gcc --version
    # load the conda infrastructure
    - conda init bash
    # because `conda activate` doesnot work out of the box!!
    - source ~/.bashrc
    - conda activate test_env
    - python -v  # For debugging
    - pip install .[dev]
    #XXX# # make sure PyTorch us using the GPUs
    #XXX# - python -c "import torch; exit('PyTorch did not find a GPU') if not torch.cuda.is_available() else print('PyTorch is using GPU')"
  script: &gen-script
    - python -m pytest --verbose

test_py38:
  stage: test
  before_script:
    - conda create -n test_env -c conda-forge 'python=3.8'
    - *before-script-after
  script: *gen-script
  artifacts:
    paths:
      - tests/test_artifacts/  # Or the directory where plots are saved
    expire_in: 1 week  # Optional: set an expiration time for artifacts
    when: on_failure  # Save artifacts only on failure

test_py39:
  stage: test
  before_script:
    - conda create -n test_env -c conda-forge 'python=3.9'
    - *before-script-after
  script: *gen-script
  artifacts:
    paths:
      - tests/test_artifacts/  # Or the directory where plots are saved
    expire_in: 1 week  # Optional: set an expiration time for artifacts
