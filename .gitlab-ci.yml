docs:
  extends: .cpu_template
  variables:
    PYTHON_VERSION: "3.11"
    NM_BACKEND: "torch"
  script:
    - micromamba install -y -n base -c conda-forge make pandoc
    - cd docs
    - make html
  artifacts:
    paths:
      - docs/_build
    when: on_success
  needs: []

pages:
  # Take compiled html, and make available on gitlab pages
  # at neuralmag.gitlab.io/neuralmag
  stage: deploy
  variables:
    # The deploy job does not need the neuralmag sources.
    GIT_STRATEGY: none
  script:
    # gitlab pages will published everything in `public`
    - mkdir -p public
    - cp -a docs/_build/html/* public
  artifacts:
    paths:
      - public
  rules:
    # This ensures that only pushes to the default branch will trigger
    # a pages deploy.
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
  interruptible: false
  needs: ["docs"]

build-package:
  stage: deploy
  image: !reference [.cpu_template, image]
  before_script:
    - micromamba install -y -n base -c conda-forge 'python=3.11' make pandoc
    - python -m pip install --upgrade twine
    - python -m pip install --upgrade build
  variables:
    TWINE_USERNAME: $PYPI_USERNAME
    TWINE_PASSWORD: $PYPI_PASSWORD
    NM_BACKEND: "torch"
  script:
    - python -m build
    - python -m twine upload dist/*
  rules:
    - if: $PYPI_USERNAME && $CI_COMMIT_TAG
  interruptible: false
  needs: []

demos-up-to-date:
  image: mambaorg/micromamba:jammy
  before_script:
    - micromamba install -y -n base -c conda-forge "python=3.11"
    - pip install .[dev]
  script:
    - jupyter nbconvert --to script --output-dir demos-check-generated docs/examples/*.ipynb --no-prompt
    - isort demos-check-generated/*.py
    - black demos-check-generated/*.py
    # if auto-generated notebooks are not up-to-date `diff` will fail
    - diff -u -r demos demos-check-generated


# Defining workflow rules is required to avoid duplicated pipelines
# (https://docs.gitlab.com/ee/ci/jobs/job_rules.html#avoid-duplicate-pipelines).
# With the following rules, we only run the CI on the main branch,
# for open merge requests (but not for commits on different branches when no
# MR has been opened yet), when pushing tags, or when manually running a pipeline
# in the web interface.
workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"
