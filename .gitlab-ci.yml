default:
  # cancel old pipelines on the same branch/MR when a new commit is pushed
  interruptible: true

variables:
  # re-try initial git clone on failure
  GET_SOURCES_ATTEMPTS: 3

# Dot in front of the job will hide it from the CI
.test_template:
  stage: test
  variables:
    PYTEST_ADDOPTS: "--color=yes"
  artifacts:
    paths:
      - tests/test_artifacts/  # Or the directory where plots are saved
    expire_in: 1 week  # Optional: set an expiration time for artifacts
    when: on_failure  # Save artifacts only on failure
  script: python -m pytest --verbose
  needs: []

.cpu_template:
  extends: .test_template
  image: mambaorg/micromamba:jammy
  before_script:
    - micromamba install -y -n base -c conda-forge "python=$PYTHON_VERSION"
    - python --version  # For debugging
    - pip install .[dev,$NM_BACKEND]

.gpu_template:
  extends: .test_template
  image: mambaorg/micromamba:jammy-cuda-12.3.1
  before_script:
    - micromamba install -y -n base -c conda-forge "python=$PYTHON_VERSION"
    - python --version  # For debugging
    - nvidia-smi  # Nvidia GPU information
    - pip install .[dev,$NM_BACKEND]
    - |
      if [ "$NM_BACKEND" = "torch" ]; then
        python -c "import torch; exit('PyTorch did not find a GPU') if not torch.cuda.is_available() else print('PyTorch is using GPU')"
      fi
  tags:
    - saas-linux-medium-amd64-gpu-standard

test_code_formatting:
  stage: test
  image: !reference [.cpu_template, image]
  before_script:
    - micromamba install -y -n base -c conda-forge 'python=3.11' git
    - git --version # make sure git in installed
    - git config --global --add safe.directory $(pwd)
    - python -m pip install pre-commit
    - pre-commit install
  script:
    - pre-commit run --all-files
  needs: []


generate_notebook_pipeline_config:
  stage: .pre
  image: python:3.11
  before_script:
    - pip install -r .gitlab/ci/requirements.txt
  script:
    - python .gitlab/ci/generate-notebook-pipeline.py
    - cat generated-notebook-pipeline.yml
  artifacts:
    paths:
      - generated-notebook-pipeline.yml

trigger_notebook_pipeline:
  stage: test
  needs:
    - generate_notebook_pipeline_config
  trigger:
    include:
      - artifact: generated-notebook-pipeline.yml
        job: generate_notebook_pipeline_config
    strategy: depend


