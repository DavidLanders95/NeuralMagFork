default:
  image: continuumio/miniconda3:4.10.3p1
  tags:
    - cloud-gpu
    - nvidia-cc80

# Dot in front of the job will hide it from the CI
.setup_python_containers_and_test:
  before_script: &before-script-after
    # For pyvista/vtk and GCC
    - apt update -y -qq && apt install -y -qq libgl1 build-essential
    - gcc --version
    # Find and install cudatoolkit for numba
    - export CUDA_Version=$(nvidia-smi | grep CUDA | sed 's/.*CUDA Version..\(.*\)..*/\1/')
    - conda install -y -n test_env -c conda-forge cudatoolkit=$CUDA_Version
    # load the conda infrastructure
    - conda init bash
    # because `conda activate` doesnot work out of the box!!
    - source ~/.bashrc
    - conda activate test_env
    - python -v  # For debugging
    - pip install .[dev]
  script: &gen-script
    - python -m pytest --verbose

test_py38:
  stage: test
  before_script:
    - conda create -n test_env -c conda-forge 'python=3.8'
    - *before-script-after
  script: *gen-script
  artifacts:
    paths:
      - tests/test_artifacts/  # Or the directory where plots are saved
    expire_in: 1 week  # Optional: set an expiration time for artifacts
    when: on_failure  # Save artifacts only on failure

test_py39:
  stage: test
  before_script:
    - conda create -n test_env -c conda-forge 'python=3.9'
    - *before-script-after
  script: *gen-script
  artifacts:
    paths:
      - tests/test_artifacts/  # Or the directory where plots are saved
    expire_in: 1 week  # Optional: set an expiration time for artifacts
    when: on_failure  # Save artifacts only on failure

test_py310:
  stage: test
  before_script:
    - conda create -n test_env -c conda-forge 'python=3.10'
    - *before-script-after
  script: *gen-script
  artifacts:
    paths:
      - tests/test_artifacts/  # Or the directory where plots are saved
    expire_in: 1 week  # Optional: set an expiration time for artifacts
    when: on_failure  # Save artifacts only on failure

test_code_formatting:
  image: "python:3.9"
  tags:
    - shared
    - docker
    - cloud
  stage: test
  before_script:
    - python -m pip install pre-commit
    - pre-commit install
  script:
    - pre-commit run --all-files
